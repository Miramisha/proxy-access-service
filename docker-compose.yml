services:

  backend:
    build: ./backend
    container_name: backend_app

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}

      REDIS_URL: ${REDIS_URL}

      VM_TIMEOUT_MINUTES: ${VM_TIMEOUT_MINUTES}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

    depends_on:
      - postgres
      - redis

    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  frontend:
    build: ./frontend
    container_name: frontend_app

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host 0.0.0.0


  celery:
    build: ./backend
    container_name: celery_worker

    command: celery -A app.tasks.celery_app worker --loglevel=info

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}

      REDIS_URL: ${REDIS_URL}

      VM_TIMEOUT_MINUTES: ${VM_TIMEOUT_MINUTES}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

    depends_on:
      - redis
      - postgres

    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs


  celery_beat:
    build: ./backend
    container_name: celery_beat

    command: celery -A app.tasks.celery_app beat --loglevel=info

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}

      REDIS_URL: ${REDIS_URL}

      VM_TIMEOUT_MINUTES: ${VM_TIMEOUT_MINUTES}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

    depends_on:
      - redis
      - postgres

    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs


  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: proxy_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: redis_db

    ports:
      - "6379:6379"


volumes:
  postgres_data: