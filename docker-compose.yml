services:

  backend:
    build: ./backend

    container_name: backend_app

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg2://admin:admin@postgres:5432/proxy_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key-change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    depends_on:
      - postgres
      - redis

    volumes:
      - ./backend:/app


  postgres:
    image: postgres:16

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: proxy_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7

    container_name: redis_db

    ports:
      - "6379:6379"


volumes:
  postgres_data: